document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

Menlo, monospace;\n\n  /* ── Type weights (Greycliff CF) ───────────────────────────────────── */\n  --fw-regular: 400;\n  --fw-medium:  500;\n  --fw-demi:    600;   /* \"Demi Bold\" in Figma */\n  --fw-bold:    700;\n\n  /* ── Type scale (px) — derived from observed sizes in the file ─────── */\n  --fs-10:  10px;\n  --fs-11:  11px;\n  --fs-12:  12px;\n  --fs-13:  13px;\n  --fs-14:  14px;   /* most common label / meta */\n  --fs-16:  16px;   /* body, button text */\n  --fs-18:  18px;   /* most-used heading / nav */\n  --fs-20:  20px;\n  --fs-24:  24px;\n  --fs-30:  30px;   /* page heading */\n  --fs-32:  32px;\n  --fs-36:  36px;\n  --fs-48:  48px;\n  --fs-50:  50px;   /* J2 cover eyebrow */\n  --fs-200: 200px;  /* J2 cover title */\n\n  --lh-tight: 1.0;\n  --lh-snug:  1.3;\n  --lh-body:  1.5;\n  --ls-wide:  0.02em;   /* 2% letter-spacing — used on display + buttons */\n\n  /* ── Brand palette ─────────────────────────────────────────────────── */\n  /* The J2 brand mark uses a multi-stop spectrum gradient (purple-blue → */\n  /* aqua → green → yellow). It's used for the logo container only;       */\n  /* product UI itself is restrained and almost monochrome blue.          */\n  --brand-gradient:\n    linear-gradient(135deg,\n      #b48cf2 0%,\n      #6aa2ff 22%,\n      #4cc8e0 45%,\n      #5bd49a 65%,\n      #f6d54a 90%,\n      #f5a341 100%);\n\n  --brand-gradient-soft:\n    linear-gradient(180deg, #cfe5fa 0%, #8fc0f2 100%);   /* cover backdrop */\n\n  /* ── Primary (Jane Blue) ───────────────────────────────────────────── */\n  --blue-700: rgb(8, 35, 56);     /* darkest navy text/fill   */\n  --blue-600: rgb(3, 23, 62);     /* deep navy                */\n  --blue-550: rgb(4, 41, 78);     /* cover headline navy      */\n  --blue-500: rgb(10, 105, 200);  /* primary action / links   */\n  --blue-400: rgb(106, 149, 186); /* avatar tint, illustration*/\n  --blue-300: rgb(151, 180, 207); /* divider on dark backdrop */\n  --blue-200: rgb(204, 219, 232); /* notification dot, surface*/\n  --blue-100: rgb(231, 241, 252); /* tinted bg / chip surface */\n  --blue-050: rgb(246, 248, 251); /* page background          */\n  --blue-tint-10: rgba(10, 105, 200, 0.10); /* soft fill      */\n  --blue-tint-20: rgba(10, 105, 200, 0.20); /* soft border    */\n\n  /* ── Neutrals (cool gray) ──────────────────────────────────────────── */\n  --gray-900: rgb(34, 37, 41);    /* primary text             */\n  --gray-800: rgb(59, 61, 64);    /* heading text             */\n  --gray-700: rgb(64, 71, 80);\n  --gray-600: rgb(109, 113, 121); /* secondary text / icon    */\n  --gray-550: rgb(100, 116, 130); /* meta on tinted surface   */\n  --gray-500: rgb(130, 143, 154); /* placeholder              */\n  --gray-450: rgb(113, 113, 130); /* alt secondary text       */\n  --gray-400: rgb(191, 197, 203); /* muted icon / disabled    */\n  --gray-300: rgb(215, 219, 226); /* default border           */\n  --gray-250: rgb(221, 224, 228); /* card divider             */\n  --gray-200: rgb(230, 233, 238); /* surface alt              */\n  --gray-100: rgb(246, 248, 251); /* page background          */\n  --gray-050: rgb(251, 251, 252); /* lightest surface         */\n  --white:    rgb(255, 255, 255);\n  --black:    rgb(0, 0, 0);\n\n  /* ── Semantic / status ─────────────────────────────────────────────── */\n  --success-600: rgb(13, 104, 13);    /* \"Approved\" badge text  */\n  --success-500: rgb(17, 137, 17);    /* check / complete       */\n  --success-200: rgb(194, 242, 226);  /* soft mint surface      */\n  --success-100: rgb(223, 240, 223);  /* \"Approved\" badge bg    */\n  --success-fill:rgb(51, 200, 150);   /* progress / pill        */\n\n  --danger-600:  rgb(170, 56, 52);    /* \"Past Due\" icon        */\n  --danger-500:  rgb(201, 62, 57);    /* error stroke / fill    */\n  --danger-100:  rgb(252, 218, 217);  /* \"Past Due\" badge bg    */\n\n  --warn-500:    rgb(247, 210, 13);   /* \"At Risk\" yellow       */\n  --warn-100:    rgba(247, 210, 13, 0.18);\n\n  --info-500:    rgb(51, 193, 254);   /* sky highlight          */\n  --info-400:    rgb(0, 178, 255);    /* link / accent alt      */\n  --purple-500:  rgb(99, 64, 204);    /* AI accent              */\n\n  /* ── Status pill colour pairs (bg / border / text) ────────────────── */\n  --status-inprogress-bg:    var(--blue-tint-10);\n  --status-inprogress-border:var(--blue-tint-20);\n  --status-inprogress-text:  var(--blue-500);\n\n  --status-pastdue-bg:       var(--danger-100);\n  --status-pastdue-text:     var(--danger-600);\n\n  --status-atrisk-bg:        var(--warn-100);\n  --status-atrisk-text:      rgb(120, 96, 4);\n\n  --status-notstarted-bg:    var(--gray-200);\n  --status-notstarted-text:  var(--gray-600);\n\n  --status-approved-bg:      var(--success-100);\n  --status-approved-text:    var(--success-600);\n\n  /* ── Foreground / surface semantic vars ────────────────────────────── */\n  --fg-1: var(--gray-900);   /* primary text */\n  --fg-2: var(--gray-800);   /* secondary heading */\n  --fg-3: var(--gray-600);   /* meta */\n  --fg-4: var(--gray-500);   /* placeholder */\n  --fg-on-blue: var(--white);\n  --fg-link: var(--blue-500);\n\n  --bg-app:     var(--blue-050);\n  --bg-surface: var(--white);\n  --bg-tint:    var(--blue-100);\n  --bg-muted:   var(--gray-200);\n\n  --border-default: var(--gray-300);\n  --border-strong:  var(--gray-400);\n  --border-tinted:  rgba(10, 105, 200, 0.20);\n\n  /* ── Radii (observed: 4 / 6 / 8 / 12 / 24 / 30 / pill) ─────────────── */\n  --r-xs:  4px;    /* badges */\n  --r-sm:  6px;    /* inline buttons, list rows */\n  --r-md:  8px;    /* cards, status pills, segmented */\n  --r-lg:  12px;   /* large cards, action cards */\n  --r-xl:  18px;   /* deck/cover */\n  --r-pill:30px;   /* avatar chip, search field */\n  --r-round:1000px;/* primary buttons, icon buttons */\n\n  /* ── Shadow / elevation ────────────────────────────────────────────── */\n  --shadow-card:    0 1px 2px -1px rgba(0,0,0,0.10), 0 1px 3px 0 rgba(0,0,0,0.10);\n  --shadow-pop:     0 2px 8px 4px rgba(0,0,0,0.15);\n  --shadow-topnav:  8px 2px 10px 0 rgba(0,0,0,0.15);\n  --shadow-focus:   0 0 0 3px rgba(10,105,200,0.25);\n\n  /* ── Spacing ───────────────────────────────────────────────────────── */\n  --s-1: 4px;\n  --s-2: 8px;\n  --s-3: 12px;\n  --s-4: 16px;\n  --s-5: 24px;\n  --s-6: 32px;\n  --s-7: 40px;\n  --s-8: 54px;   /* top-nav padding */\n  --s-9: 64px;\n\n  /* ── Motion ───────────────────────────────────────────────────────── */\n  --ease-out:   cubic-bezier(0.16, 1, 0.3, 1);\n  --ease-in-out:cubic-bezier(0.65, 0, 0.35, 1);\n  --dur-1:      120ms;\n  --dur-2:      180ms;\n  --dur-3:      280ms;\n}\n\n/* =========================================================================\n   Semantic type — apply by class or @extend in component files.\n   ========================================================================= */\n\n.type-display-xl {                  /* J2 cover lockup */\n  font-family: var(--font-sans);\n  font-weight: var(--fw-bold);\n  font-size: var(--fs-200);\n  line-height: var(--lh-tight);\n  letter-spacing: var(--ls-wide);\n  color: var(--blue-550);\n}\n.type-eyebrow-xl {\n  font-family: var(--font-sans);\n  font-weight: var(--fw-medium);\n  font-size: var(--fs-50);\n  line-height: var(--lh-tight);\n  letter-spacing: var(--ls-wide);\n  color: var(--blue-550);\n}\n\n.type-h1 { font: var(--fw-bold) var(--fs-30)/36px var(--font-sans); color: var(--fg-1); }\n.type-h2 { font: var(--fw-bold) var(--fs-30)/39px var(--font-sans); color: var(--fg-1); }\n.type-h3 { font: var(--fw-bold) var(--fs-18)/24px var(--font-sans); color: var(--fg-1); }\n.type-h4 { font: var(--fw-bold) var(--fs-16)/24px var(--font-sans); color: var(--fg-1); }\n\n.type-body         { font: var(--fw-regular) var(--fs-16)/24px var(--font-sans); color: var(--fg-1); }\n.type-body-strong  { font: var(--fw-bold)    var(--fs-16)/24px var(--font-sans); color: var(--fg-1); }\n.type-meta         { font: var(--fw-regular) var(--fs-14)/21px var(--font-sans); color: var(--fg-3); }\n.type-meta-strong  { font: var(--fw-bold)    var(--fs-14)/21px var(--font-sans); color: var(--fg-1); }\n.type-label        { font: var(--fw-bold)    var(--fs-14)/21px var(--font-sans); color: var(--fg-1); letter-spacing: var(--ls-wide); }\n.type-button       { font: var(--fw-bold)    var(--fs-16)/100% var(--font-sans); }\n.type-button-sm    { font: var(--fw-bold)    var(--fs-14)/21px var(--font-sans); }\n.type-caption      { font: var(--fw-regular) var(--fs-12)/16px var(--font-sans); color: var(--fg-3); }\n.type-mono         { font: var(--fw-regular) var(--fs-13)/20px var(--font-mono); color: var(--fg-2); }\n\n/* Convenience: page-level reset to ensure tokens render */\nhtml, body { background: var(--bg-app); color: var(--fg-1); font-family: var(--font-sans); }\n<\u002Fstyle>\n  <script src=\"1946ef1e-54d9-49bc-a4b3-e6060df5cdf1\"><\u002Fscript>\n  <style>\n    * { box-sizing: border-box; }\n    html, body { margin: 0; padding: 0; background: #06436f; }\n    @keyframes sunspin { to { transform: rotate(360deg); } }\n    @keyframes sunpulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }\n    @keyframes twinkle { 0%,100% { opacity: .25; transform: scale(.7); } 50% { opacity: 1; transform: scale(1); } }\n    @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh; width:100%; display:flex; justify-content:center; align-items:flex-start; background:linear-gradient(180deg,#0a6cb0 0%,#06436f 100%); font-family:'Greycliff CF','Outfit',system-ui,sans-serif; color:#0a2540;\">\n  <div style=\"width:100%; max-width:462px; background:#eef7fd; position:relative; overflow:hidden; box-shadow:0 0 50px rgba(0,0,0,.3);\">\n\n    <!-- ===================== HERO ===================== -->\n    <div style=\"position:relative; padding:30px 24px 0; background:linear-gradient(180deg,#5ec7ee 0%,#2a9fdc 55%,#1184c4 100%); overflow:hid les\" width=\"18\" height=\"18\" style=\"color:#ffd23f;\"><\u002Fi>\n        <i data-lucide=\"waves\" width=\"18\" height=\"18\" style=\"color:#fff;\"><\u002Fi>\n        <i data-lucide=\"sparkles\" width=\"18\" height=\"18\" style=\"color:#ee6b6b;\"><\u002Fi>\n      <\u002Fdiv>\n      <div style=\"font-weight:700; font-size:20px; color:#fff; letter-spacing:.01em;\">See you poolside!<\u002Fdiv>\n      <div style=\"font-weight:500; font-size:14px; color:#bcdcf2; margin-top:4px;\">Let's make a splash this Fourth.<\u002Fdiv>\n      <div style=\"display:inline-flex; gap:5px; margin-top:14px;\">\n        <span style=\"width:26px; height:5px; border-radius:3px; background:#ee4b4b;\"><\u002Fspan>\n        <span style=\"width:26px; height:5px; border-radius:3px; background:#fff;\"><\u002Fspan>\n        <span style=\"width:26px; height:5px; border-radius:3px; background:#ffd23f;\"><\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { tab: 'plan' };\n  componentDidMount() {\n    const draw = () => {\n      if (window.lucide && window.lucide.createIcons) {\n        window.lucide.createIcons();\n      } else {\n        setTimeout(draw, 80);\n      }\n    };\n    draw();\n  }\n  componentDidUpdate() {\n    if (window.lucide && window.lucide.createIcons) window.lucide.createIcons();\n  }\n  renderVals() {\n    const tab = this.state.tab || 'plan';\n    const base = { flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '6px', border: 'none', cursor: 'pointer', fontFamily: 'inherit', fontWeight: 700, fontSize: '14px', letterSpacing: '.01em', padding: '10px 6px', borderRadius: '1000px', transition: 'background .15s, color .15s' };\n    const mk = (on) => on\n      ? { ...base, background: '#1184c4', color: '#fff', boxShadow: '0 3px 8px rgba(17,132,196,.3)' }\n      : { ...base, background: 'transparent', color: '#5a6b78' };\n    const set = (t) => () => this.setState({ tab: t });\n    return {\n      showCrew: tab === 'crew',\n      showPlan: tab === 'plan',\n      showMenu: tab === 'menu',\n      setCrew: set('crew'),\n      setPlan: set('plan'),\n      setMenu: set('menu'),\n      crewBtnStyle: mk(tab === 'crew'),\n      planBtnStyle: mk(tab === 'plan'),\n      menuBtnStyle: mk(tab === 'menu'),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
